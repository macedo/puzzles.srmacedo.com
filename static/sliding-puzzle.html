<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sliding Puzzle Touch & Drag</title>
    <link rel="stylesheet" href="/css/application.css">
    <link rel="stylesheet" href="/css/sliding-puzzle.css">

  </head>
  <body>
    <a href="/" class="back-btn">← Voltar ao Menu</a>
    <h2>Sliding Puzzle</h2>
    <div id="game-container"></div>

    <div class="controls">
      <p id="status">Arraste as peças!</p>
      <button onclick="shuffleBoard()">Reiniciar Jogo</button>
    </div>

    <script>
    const container = document.getElementById('game-container');
    let tiles = [1, 2, 3, 4, 5, 6, 7, 8, null];
    const size = 3;

    function render() {
      container.innerHTML = '';
      tiles.forEach((value, index) => {
        const tileDiv = document.createElement('div');
        tileDiv.className = 'tile' + (value === null ? ' empty' : '');

        if (value !== null) {
          tileDiv.textContent = value;
          setupDragEvents(tileDiv, index);
        } else {
          tileDiv.style.visibility = 'hidden';
        }
        container.appendChild(tileDiv);
      });
    }

    function setupDragEvents(el, index) {
      let startX, startY;

      el.onpointerdown = (e) => {
        const emptyIndex = tiles.indexOf(null);
        if (!isAdjacent(index, emptyIndex)) return;

        el.setPointerCapture(e.pointerId);
        el.classList.add('dragging');
        startX = e.clientX;
        startY = e.clientY;

        el.onpointermove = (moveEvent) => {
          const dx = moveEvent.clientX - startX;
          const dy = moveEvent.clientY - startY;

          // Limita o movimento visual ao eixo permitido
          const moveDir = getDirection(index, emptyIndex);
          if (moveDir === 'h') el.style.transform = `translateX(${dx}px)`;
          if (moveDir === 'v') el.style.transform = `translateY(${dy}px)`;
        };

        el.onpointerup = (upEvent) => {
          el.onpointermove = null;
          el.onpointerup = null;
          el.classList.remove('dragging');
          el.style.transform = '';

          const dist = Math.sqrt(Math.pow(upEvent.clientX - startX, 2) + Math.pow(upEvent.clientY - startY, 2));

          // Se arrastou mais de 30px ou apenas clicou, move a peça
          if (dist > 30 || dist < 5) {
            moveTile(index);
          }
        };
      };
    }

    function isAdjacent(idx1, idx2) {
      const r1 = Math.floor(idx1 / size), c1 = idx1 % size;
      const r2 = Math.floor(idx2 / size), c2 = idx2 % size;
      return Math.abs(r1 - r2) + Math.abs(c1 - c2) === 1;
    }

    function getDirection(idx1, idx2) {
      return Math.floor(idx1 / size) === Math.floor(idx2 / size) ? 'h' : 'v';
    }

    function moveTile(index) {
      const emptyIndex = tiles.indexOf(null);
      if (isAdjacent(index, emptyIndex)) {
        [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
        render();
        checkWin();
      }
    }

    function shuffleBoard() {
      // Embaralha de forma válida (simulando movimentos)
      for (let i = 0; i < 200; i++) {
        const emptyIdx = tiles.indexOf(null);
        const adj = [];
        if (emptyIdx % size > 0) adj.push(emptyIdx - 1);
        if (emptyIdx % size < size - 1) adj.push(emptyIdx + 1);
        if (emptyIdx >= size) adj.push(emptyIdx - size);
        if (emptyIdx < size * (size - 1)) adj.push(emptyIdx + size);
        const randomAdj = adj[Math.floor(Math.random() * adj.length)];
        [tiles[emptyIdx], tiles[randomAdj]] = [tiles[randomAdj], tiles[emptyIdx]];
      }
      render();
    }

    function checkWin() {
      if (tiles.slice(0, -1).every((v, i) => v === i + 1)) {
        document.getElementById('status').textContent = "🎉 Você venceu!";
      }
    }

    shuffleBoard();
    </script>
  </body>
</html>
